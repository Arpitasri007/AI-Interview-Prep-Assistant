<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InterviewPrep AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<script>

let timeLeft = 120;

let timer = setInterval(() => {

    let minutes =
        Math.floor(timeLeft / 60);

    let seconds =
        timeLeft % 60;

    document.getElementById("timer")
    .innerText =
        `${minutes}:${seconds
        .toString()
        .padStart(2,'0')}`;

    timeLeft--;

    if(timeLeft < 0){

        clearInterval(timer);

        alert(
            "Time is up!"
        );

        document.querySelector(
            "form"
        ).submit();
    }

},1000);

</script>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-robot"></i>
                InterviewPrep AI
            </a>
            <div>
                <a href="/dashboard" class="btn btn-outline-light me-2">
                    <i class="bi bi-speedometer2"></i>
                    Dashboard
                </a>
                <a href="/leaderboard" class="btn btn-outline-light me-2">
                    <i class="bi bi-trophy"></i>
                    Leaderboard
                </a>
                <a href="/resume" class="btn btn-outline-light me-2">
                    <i class="bi bi-file-earmark-person"></i>
                    Resume
                </a>
                <a href="/hr" class="btn btn-outline-light me-2">
                    <i class="bi bi-person-workspace"></i>
                    HR Interview
                </a>
                <button
                    id="themeBtn"
                    class="btn btn-warning">
                    🌙
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="container mt-5">

        <div class="text-center mb-5">

            <h1 class="display-3 fw-bold">
                AI Interview Preparation Assistant
            </h1>

            <p class="lead text-secondary">
                Practice technical interviews and get
                AI-powered feedback instantly.
            </p>

        </div>

        <!-- Interview Card -->
        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="card border-0 shadow-lg">

                    <div class="card-body p-5">

                        <form action="/evaluate" method="POST">

                            <!-- Subject Dropdown -->
                            <div class="mb-4">

                                <label class="form-label fw-bold">
                                    Select Subject
                                </label>

                                <select
                                    name="subject"
                                    id="subject"
                                    class="form-select">

                                    {% for sub in subjects %}
                                    <option value="{{ sub }}">
                                        {{ sub }}
                                    </option>
                                    {% endfor %}

                                </select>

                            </div>
                            <label>Difficulty</label>
                            <select
                            name="difficulty"
                            id="difficulty"
                            class="form-select">
                            <option value="Easy">Easy</option>
                            <option value="Medium">Medium</option>
                            <option value="Hard">Hard</option>
                            </select>
                            <div class="alert alert-danger text-center">
                                <h2 id="timer">
                                    02:00
                                </h2>
                            </div>
                            <div class="mb-4">
                            <div class="d-flex justify-content-between">
                                <span>Progress</span>
                                <span id="progressText">
                                    Question 1 / 10
                                </span>
                            </div>
                            <div class="progress">
                            <div
                            id="progressBar"
                            class="progress-bar progress-bar-striped progress-bar-animated"
                            style="width:10%">
                        </div>
                        </div>
                        </div>
                            <!-- Question -->
                            <div class="alert alert-primary">

                                <h4
                                    id="questionText"
                                    class="mb-0">

                                    {{ question }}

                                </h4>

                            </div>

                            <!-- Hidden Question Field -->
                            <input
                                type="hidden"
                                id="question"
                                name="question"
                                value="{{ question }}">

                            <!-- Answer Box -->
                            <div class="mb-4">

                                <label class="form-label fw-bold">
                                    Your Answer
                                </label>

                                <textarea
                                    name="answer"
                                    rows="8"
                                    class="form-control"
                                    placeholder="Type your answer here..."
                                    required></textarea>

                            </div>

                            <!-- Submit Button -->
                            <div class="d-grid">

                                <button
                                    type="submit"
                                    class="btn btn-primary btn-lg">

                                    Submit Answer

                                </button>

                            </div>
                        
                        </form>
                    
                    </div>
                </div>

            </div>

        </div>

    </div>
   <script>
   const questionsData = {{ questions|tojson|safe }};
   function updateQuestion() {
    const subject =
        document.getElementById("subject").value;
    const difficulty =
        document.getElementById("difficulty").value;

    const questionList =
        questionsData[subject][difficulty];

    const randomQuestion =
        questionList[
            Math.floor(
                Math.random() * questionList.length
            )
        ];

    document.getElementById(
        "questionText"
    ).innerText = randomQuestion.question;

    document.getElementById(
        "question"
        ).value = randomQuestion.question;
    }

    document.getElementById(
        "subject"
        ).addEventListener(
        "change",
        updateQuestion
    );

        document.getElementById(
        "difficulty"
        ).addEventListener(
        "change",
        updateQuestion
    );

    window.onload = updateQuestion;

    </script>
    <script>
    const btn =
    document.getElementById("themeBtn");
    btn.addEventListener("click",()=>{
        document.body.classList.toggle(
            "dark-mode"
        );
    });
    </script>
</body>

</html>
