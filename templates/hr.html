<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"><link rel="stylesheet"
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>HR Mock Interview</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand fw-bold"
           href="/">
            InterviewPrep AI
        </a>

        <div>

            <a href="/dashboard"
               class="btn btn-outline-light me-2">
                Dashboard
            </a>

            <a href="/logout"
               class="btn btn-danger">
                Logout
            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-lg border-0">

                <div class="card-body p-5">

                    <h1 class="text-center mb-4">
                        AI Mock HR Interview
                    </h1>

                    <p class="text-center text-muted">
                        Answer the HR question below as if you are in a real interview.
                    </p>

                    <hr>

                    <div class="alert alert-primary">

                        <h4 class="mb-0">
                            {{ question }}
                        </h4>

                    </div>

                    <form action="/evaluate_hr"
                          method="POST">

                        <input type="hidden"
                               name="question"
                               value="{{ question }}">

                        <div class="mb-4">

                            <label class="form-label fw-bold">
                                Your Answer
                            </label>

                            <textarea
                                name="answer"
                                rows="8"
                                class="form-control"
                                placeholder="Type your answer here..."
                                required></textarea>

                        </div>

                        <div class="d-grid">

                            <button
                                type="submit"
                                class="btn btn-success btn-lg">

                                Submit Answer

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
